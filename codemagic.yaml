workflows:
  # ---------------------------------------------------------------------------
  # 1) Quick unsigned build — verifies the app compiles on a real Mac/Xcode.
  #    Produces a Runner.app (installable on the iOS Simulator only, not devices).
  #    Needs NO Apple Developer account — run this first to confirm everything works.
  # ---------------------------------------------------------------------------
  ios-unsigned:
    name: iOS unsigned (verify build)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Pod install
        script: find . -name "Podfile" -execdir pod install \;
      - name: Analyze
        script: flutter analyze
      - name: Build unsigned iOS
        script: flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/Runner.app

  # ---------------------------------------------------------------------------
  # 2) Signed release → TestFlight / App Store.
  #    Requires an Apple Developer account ($99/yr). Before running:
  #      • In Codemagic: Teams → Integrations → App Store Connect → add an API key,
  #        the key is named "BeeBuckz" in Codemagic (must match below).
  #      • Create the app in App Store Connect with bundle id com.beebuckz.app
  #        and put its numeric Apple ID in APP_STORE_APPLE_ID below.
  # ---------------------------------------------------------------------------
  ios-release:
    name: iOS release (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: BeeBuckz
    environment:
      vars:
        APP_STORE_APPLE_ID: 6786223432   # BeeBuckz — com.beebuckz.app
        BUNDLE_ID: "com.beebuckz.app"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Pod install
        script: find . -name "Podfile" -execdir pod install \;
      - name: Set up code signing (create cert + profile if missing)
        script: |
          keychain initialize
          # Use a STABLE committed private key so fetch-signing-files reuses the
          # same distribution certificate every build instead of creating a new
          # one each time (Apple caps distribution certs, so per-build keys hit
          # the limit). Creates the cert + profile on first run, reuses after.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:ios/signing/dist_key.pem \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build signed IPA
        script: flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
